services:
  - type: web
    name: codesage-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: GITHUB_TOKEN
        sync: false
